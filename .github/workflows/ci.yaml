name: CI/CD - GitOps Full Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: demo-app
  IMAGE_TAG: ${{ github.run_number }}

jobs:

  validate-yaml:
    name: "🔍 Validate YAML Manifests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate YAML syntax
        run: |
          yamllint apps/demo-app/base/deployment.yaml
          yamllint apps/demo-app/base/service.yaml
          echo "✅ YAML válido"

  build-and-push:
    name: "🐳 Build & Push Image to ACR"
    runs-on: ubuntu-latest
    needs: validate-yaml
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ env.IMAGE_TAG }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push image
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            ./app

          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

          echo "✅ Imagen pusheada: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

  update-manifest:
    name: "📝 Update Kubernetes Manifest"
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image in deployment.yaml
        run: |
          echo "📝 Actualizando imagen en manifest..."
          echo "Nueva imagen: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

          sed -i "s|image:.*|image: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}|g" \
            apps/demo-app/base/deployment.yaml

          echo "✅ Manifest actualizado"
          cat apps/demo-app/base/deployment.yaml | grep image

      - name: Commit and push manifest update
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add apps/demo-app/base/deployment.yaml
          git commit -m "ci: update image to ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} [skip ci]"
          git push
          echo "✅ Manifest actualizado en Git"

  validate-against-cluster:
    name: "☁️ Validate Against AKS"
    runs-on: ubuntu-latest
    needs: update-manifest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Validate against real cluster
        run: |
          kubectl kustomize apps/demo-app/overlays/production | \
          kubectl apply --dry-run=server -f -
          echo "✅ Validación contra clúster exitosa"

  check-argocd-sync:
    name: "🔄 Check Argo CD Sync"
    runs-on: ubuntu-latest
    needs: validate-against-cluster
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Wait for Argo CD sync
        run: |
          echo "⏳ Esperando que Argo CD detecte el cambio en Git..."
          sleep 60

          for i in {1..5}; do
            STATUS=$(kubectl get application demo-app-prod \
              -n argocd \
              -o jsonpath='{.status.sync.status}')

            echo "Intento $i — Sync Status: $STATUS"

            if [ "$STATUS" = "Synced" ]; then
              echo "✅ Argo CD sincronizado"
              break
            fi

            echo "⏳ Esperando... intento $i de 5"
            sleep 30
          done

  check-health:
    name: "❤️ Check App Health"
    runs-on: ubuntu-latest
    needs: check-argocd-sync
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Check deployment health
        run: |
          kubectl rollout status deployment/demo-app \
            -n production \
            --timeout=120s

          READY=$(kubectl get deployment demo-app \
            -n production \
            -o jsonpath='{.status.readyReplicas}')

          DESIRED=$(kubectl get deployment demo-app \
            -n production \
            -o jsonpath='{.spec.replicas}')

          echo "📊 Pods ready: $READY/$DESIRED"

          if [ "$READY" = "$DESIRED" ]; then
            echo "✅ App saludable - $READY/$DESIRED pods running"
          else
            echo "❌ App degradada - solo $READY/$DESIRED pods running"
            exit 1
          fi

  rollback:
    name: "⏪ Rollback if Failed"
    runs-on: ubuntu-latest
    needs: check-health
    if: failure()
    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Rollback deployment
        run: |
          echo "🚨 Deploy fallido — ejecutando rollback..."
          kubectl rollout undo deployment/demo-app -n production
          kubectl rollout status deployment/demo-app -n production
          echo "✅ Rollback completado"
